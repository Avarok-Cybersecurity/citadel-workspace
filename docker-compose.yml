services:
  sync-wasm-client:
    build:
      context: .
      dockerfile: ./docker/sync/Dockerfile
      network: host
    volumes:
      # Mount source code from host (read-write for npm builds)
      - ./citadel-internal-service:/workspace/citadel-internal-service:rw
      - ./citadel-workspace-client-ts:/workspace/citadel-workspace-client-ts:rw
      - ./citadel-workspaces:/workspace/citadel-workspaces:rw
      # Cache volumes for faster rebuilds
      - rust_cache:/root/.cargo
      - sync_node_modules:/workspace/node_modules
      - sync_target_cache:/workspace/target
    environment:
      - CONTAINER_MODE=1
    # This is a one-shot service that exits after syncing
    restart: "no"
    network_mode: host

  server:
    build:
      context: .
      dockerfile: ./docker/workspace-server/Dockerfile
      network: host
    volumes:
      # Mount relevant codebase for live updates
      - target_cache:/usr/src/app/target
      # NOTE: dev intentionally has no persistent data volume here.
      # CLAUDE.md documents the dev contract as ephemeral ("any
      # accounts created on one will be lost on reload"), and the
      # server defaults to in-memory backend when WORKSPACE_BACKEND is
      # unset. Production mounts `server_data:/data/server` in
      # docker-compose.production.yml and sets WORKSPACE_BACKEND there.
    environment:
      - RUST_LOG=citadel=info
      - WORKSPACE_MASTER_PASSWORD=${WORKSPACE_MASTER_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    healthcheck:
      test: [ "CMD", "nc", "-z", "127.0.0.1", "12349" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      sync-wasm-client:
        condition: service_completed_successfully
    network_mode: host

  internal-service:
    build:
      context: .
      dockerfile: ./docker/internal-service/Dockerfile
      network: host
      args:
        # Default to 12345 so missing/unset .env doesn't make the
        # Dockerfile bake ENV INTERNAL_SERVICE_PORT='' and crash the
        # container with an invalid --bind '0.0.0.0:'.
        - INTERNAL_SERVICE_PORT=${INTERNAL_SERVICE_PORT:-12345}
    volumes:
      # Mount shared caches and target directory
      - target_cache:/usr/src/app/target
      # Dev still gets the ephemeral-state contract documented in CLAUDE.md
      # ("any accounts created on one will be lost on reload") — but we route
      # the SDK through a tmpfs-backed filesystem path instead of the pure
      # InMemory backend. This is required for file-transfer (`SendObject`)
      # to function at all: the SDK refuses peer-to-peer file transfers when
      # both nodes are on `BackendType::InMemory` with
      #   "File transfer is not enabled for this p2p session.
      #    Both nodes must use a filesystem backend"
      # tmpfs gives us filesystem semantics without persistence — perfect for
      # dev. Production still uses a real volume via
      # docker-compose.production.yml.
    tmpfs:
      # `mode=1777` (sticky world-writable, /tmp-style) so `appuser`
      # (uid 1000, set in docker/internal-service/Dockerfile) can write
      # to the SDK's filesystem backend. Default tmpfs is root-owned
      # mode 1755 — the SDK process can't even create subdirectories,
      # which surfaces only after the container's port healthcheck
      # passes (so `docker compose up --wait` looks healthy) and the
      # first write attempt hits "Permission denied (os error 13)".
      # That mismatch made integration tests fail on every
      # `restartBackendServices()` call because the restart cycle
      # exposes the write attempt before any port probe succeeds.
      - /var/lib/internal-service:size=128m,mode=1777
    environment:
      - RUST_LOG=citadel=info
      - DOCKER_CONTAINER=1
      - SKIP_WASM_BUILD=1
      - INTERNAL_SERVICE_BACKEND=filesystem
      - INTERNAL_SERVICE_DATA_DIR=/var/lib/internal-service
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    # Mirrors the production healthcheck (see docker-compose.production.yml):
    # `nc -z` is exact-port and avoids the substring-match pitfalls of
    # `netstat | grep ":$PORT"`.
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "${INTERNAL_SERVICE_PORT:-12345}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      sync-wasm-client:
        condition: service_completed_successfully
      server:
        condition: service_healthy
    network_mode: host

  ui:
    build:
      context: .
      dockerfile: ./docker/ui/Dockerfile
      network: host
      target: dev
    volumes:
      # CRITICAL: Anonymous volume for node_modules MUST be first
      # This prevents host's node_modules from overwriting container's
      - ui_node_modules:/app/node_modules

      # Mount source code for HMR (read-write)
      - ./citadel-workspaces/src:/app/src:rw
      - ./citadel-workspaces/public:/app/public:rw
      - ./citadel-workspaces/index.html:/app/index.html:rw

      # Mount config files (read-write for hot reload)
      - ./citadel-workspaces/vite.config.ts:/app/vite.config.ts:rw
      - ./citadel-workspaces/tsconfig.json:/app/tsconfig.json:ro
      - ./citadel-workspaces/tsconfig.node.json:/app/tsconfig.node.json:ro
      - ./citadel-workspaces/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ./citadel-workspaces/tailwind.config.ts:/app/tailwind.config.ts:rw
      - ./citadel-workspaces/postcss.config.js:/app/postcss.config.js:ro
      - ./citadel-workspaces/components.json:/app/components.json:ro

      # CRITICAL: Mount WASM client dependencies (read-only)
      # These are file dependencies that get updated by sync-wasm-client
      - ./citadel-workspace-client-ts:/workspace/citadel-workspace-client-ts:ro
      - ./citadel-internal-service/typescript-client:/workspace/citadel-internal-service-wasm-client:ro

      # Create symlinks for the file dependencies in node_modules
      # This allows the UI to import from these packages
      - ./citadel-workspace-client-ts:/app/node_modules/citadel-workspace-client-ts:ro
      - ./citadel-internal-service/typescript-client:/app/node_modules/citadel-internal-service-wasm-client:ro
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    depends_on:
      sync-wasm-client:
        condition: service_completed_successfully
      internal-service:
        condition: service_healthy
      server:
        condition: service_healthy
    network_mode: host
    labels:
      - "frontend"

# Cache volumes only — dev intentionally has no persistent data
# volumes. Production data persistence lives in
# docker-compose.production.yml.
volumes:
  target_cache:
  rust_cache:
  sync_node_modules:
  sync_target_cache:
  ui_node_modules:
