name: Validate PR
on:
  workflow_call:
  pull_request:
  push:
    branches: ["master"]

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  # 40 MiB stack
  RUST_MIN_STACK: 40971520
  RUST_LOG: "citadel=warn"
  # Skip WASM build in CI (no wasm-pack installed)
  SKIP_WASM_BUILD: "1"

jobs:
  fmt:
    name: Cargo Fmt - ${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - citadel-workspace-types
          - citadel-workspace-internal-service
          - citadel-workspace-server-kernel
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: Avarok-Cybersecurity/gh-actions-deps@master
      - name: Run Cargo Fmt
        run: cargo fmt -p ${{ matrix.crate }} --check

  clippy:
    name: Cargo Clippy - ${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - citadel-workspace-types
          - citadel-workspace-internal-service
          - citadel-workspace-server-kernel
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: Avarok-Cybersecurity/gh-actions-deps@master
      - name: Run Cargo Clippy
        run: cargo clippy -p ${{ matrix.crate }} -- -D warnings

  rust-tests:
    name: Rust Tests - ${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - citadel-workspace-types
          - citadel-workspace-internal-service
          - citadel-workspace-server-kernel
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: Avarok-Cybersecurity/gh-actions-deps@master
      - name: Run Cargo Test
        run: cargo test -p ${{ matrix.crate }}

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Workspace Dependencies
        # Install from root to resolve file: dependencies between workspaces
        run: npm ci
      - name: Build citadel-internal-service typescript-client
        # Build the WASM client's TypeScript wrapper first (innermost dependency)
        run: npm run build
        working-directory: citadel-internal-service/typescript-client
      - name: Build citadel-workspace-client-ts
        # Build client-ts to generate dist/ with TypeScript declarations
        run: npm run build
        working-directory: citadel-workspace-client-ts
      - name: Install Vitest
        # Ensure vitest is available at root for workspace to use
        run: npm install vitest@3.0.7 --save-dev
      - name: Run Unit Tests
        # Run vitest directly to avoid npm -w matching nested integration-tests workspace
        run: npx vitest run
        working-directory: citadel-workspaces

  typecheck:
    name: TypeScript Type Check - ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: citadel-workspaces
            path: citadel-workspaces
          - project: citadel-workspace-client-ts
            path: citadel-workspace-client-ts
          - project: integration-tests
            path: citadel-workspaces/integration-tests
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Workspace Dependencies
        # Install from root to resolve file: dependencies between workspaces
        run: npm ci
      - name: Build citadel-internal-service typescript-client
        # Build the WASM client's TypeScript wrapper first (innermost dependency)
        # Now part of npm workspaces, so deps installed by root npm ci
        run: npm run build
        working-directory: citadel-internal-service/typescript-client
      - name: Build citadel-workspace-client-ts
        # Build client-ts to generate dist/ with TypeScript declarations
        run: npm run build
        working-directory: citadel-workspace-client-ts
      - name: Run Type Check
        run: |
          if [ "${{ matrix.project }}" = "citadel-workspaces" ]; then
            # Run from root for bundler moduleResolution (needs hoisted react)
            npx tsc -p ${{ matrix.path }}/tsconfig.app.json --noEmit
          elif [ "${{ matrix.project }}" = "integration-tests" ]; then
            # Symlink playwright for NodeNext resolution
            mkdir -p ${{ matrix.path }}/node_modules
            ln -sf ${{ github.workspace }}/node_modules/playwright ${{ matrix.path }}/node_modules/playwright
            npm run typecheck -w cw-integration-tests
          else
            npm run typecheck -w ${{ matrix.project }}
          fi
      - name: Enforce 250-line file limit
        if: matrix.project == 'citadel-workspaces'
        run: |
          # Skip list: generated/external files exempt from 250-line limit
          # Files that pre-date the 250-line cap and already exceed
          # it. The cap was introduced after they were written; this
          # PR is not the right place to refactor them. Tracked as
          # known violations so the cap still keeps NEW files in
          # check. Mirrors the equivalent allowlist in the
          # citadel-workspaces submodule's own validate.yml.
          SKIP_FILES=(
            "components/ui/sidebar.tsx"
            "components/layout/sidebar/TreeNodesSection.tsx"
            "components/p2p/ChatSettingsPanel.tsx"
            "components/tree/TreeGraphEditor.tsx"
            "lib/file-transfer/io.ts"
            "lib/file-transfer/service.ts"
            "pages/Landing.tsx"
            "types/messaging-layer.ts"
            "types/workspace-protocol.ts"
          )

          VIOLATIONS=0
          while IFS= read -r file; do
            rel="${file#citadel-workspaces/src/}"
            skip=false
            for s in "${SKIP_FILES[@]}"; do
              if [ "$rel" = "$s" ]; then skip=true; break; fi
            done
            if $skip; then continue; fi

            lines=$(wc -l < "$file")
            if [ "$lines" -gt 250 ]; then
              echo "::error file=$file::$file has $lines lines (limit: 250)"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done < <(find citadel-workspaces/src -type f \( -name '*.ts' -o -name '*.tsx' \) ! -name '*.bak')

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "FAIL: $VIOLATIONS file(s) exceed the 250-line limit"
            exit 1
          fi
          echo "All TypeScript files within 250-line limit"

  lint:
    name: ESLint - ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: citadel-workspaces
            path: citadel-workspaces
          - project: citadel-workspace-client-ts
            path: citadel-workspace-client-ts
          - project: integration-tests
            path: citadel-workspaces/integration-tests
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Workspace Dependencies
        # Install from root to resolve file: dependencies between workspaces
        run: npm ci
      - name: Build citadel-internal-service typescript-client
        # Build the WASM client's TypeScript wrapper first (innermost dependency)
        run: npm ci && npm run build
        working-directory: citadel-internal-service/typescript-client
      - name: Build citadel-workspace-client-ts
        # Build client-ts to generate dist/ with TypeScript declarations
        run: npm run build
        working-directory: citadel-workspace-client-ts
      - name: Install ESLint at root (workspaces hoisting issue)
        # Workspaces may hoist eslint to workspace dirs instead of root
        run: npm install eslint@9.39.2 --save-dev
      - name: Run ESLint
        # Symlink hoisted packages and use root eslint binary via .bin
        run: |
          mkdir -p node_modules/@eslint
          ln -sf ${{ github.workspace }}/node_modules/@eslint/js node_modules/@eslint/js
          ln -sf ${{ github.workspace }}/node_modules/globals node_modules/globals
          ln -sf ${{ github.workspace }}/node_modules/typescript-eslint node_modules/typescript-eslint
          ${{ github.workspace }}/node_modules/.bin/eslint . --max-warnings 0
        working-directory: ${{ matrix.path }}

  integration-tests:
    name: Integration Test - ${{ matrix.test }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - test: test:p2p
            artifact: p2p
          - test: test:live-doc
            artifact: live-doc
          - test: test:group
            artifact: group
          - test: test:group-multiuser
            artifact: group-multiuser
          - test: test:crud
            artifact: crud
          - test: test:login
            artifact: login
          - test: test:prev-sessions
            artifact: prev-sessions
          - test: test:file-transfer
            artifact: file-transfer
          - test: test:offline
            artifact: offline
          - test: test:hard-disconnect
            artifact: hard-disconnect
          - test: test:permissions
            artifact: permissions
          - test: test:admin-modal
            artifact: admin-modal
          - test: test:security
            artifact: security
          - test: test:topbar
            artifact: topbar
          - test: test:p2p-types
            artifact: p2p-types
          - test: test:settings-controls
            artifact: settings-controls
          - test: test:directory-actions
            artifact: directory-actions
          - test: test:member-mgmt
            artifact: member-mgmt
          - test: test:group-extended
            artifact: group-extended
          - test: test:files-extended
            artifact: files-extended
          - test: test:mdx-content
            artifact: mdx-content
          - test: test:misc
            artifact: misc
          - test: test:account-mgmt
            artifact: account-mgmt
          - test: test:hierarchy-nav
            artifact: hierarchy-nav
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Free Disk Space
        run: |
          # Remove unnecessary pre-installed tools (frees 10-20 GB)
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        # Run `npm ci` at the workspace root so playwright is installed
        # ONCE (hoisted at root) instead of being installed both at root
        # AND at citadel-workspaces/node_modules — the latter causes
        # `tsc` to see two distinct `playwright-core/types/types`
        # locations and fail every test build with:
        #   Type 'X/playwright-core/.../Browser' is not assignable to
        #   type 'Y/playwright-core/.../Browser'
        # plus `Property 'toBeVisible' does not exist on type
        # 'MakeMatchers<…>'` because the wrong `@playwright/test`
        # `expect` augmentation gets picked up. Installing once at
        # root unifies module resolution.
        #
        # IMPORTANT: install deps BEFORE `playwright install`. Running
        # `npx playwright install` first triggers npx to auto-fetch the
        # *latest* playwright, which downloads chrome-headless-shell for
        # a different version than the locked one. The test then fails
        # with "Executable doesn't exist at .../chromium_headless_shell-<v>"
        # because the installed binary version doesn't match the one
        # playwright@locked-version expects.
        run: npm ci
      - name: Install Playwright Browsers
        # Now that deps are installed, this resolves to the locked
        # version's `playwright install` and downloads the matching
        # chromium build.
        run: npx playwright install chromium --with-deps
      - name: Symlink workspace deps for integration-tests build
        # `tsc` in integration-tests resolves modules with NodeNext
        # which walks node_modules up the directory tree. After the
        # workspace install, playwright lives at workspace-root
        # node_modules — symlink it into integration-tests so the
        # closest-resolution rule lands on the single hoisted copy
        # instead of attempting to resolve via citadel-workspaces.
        run: |
          mkdir -p citadel-workspaces/integration-tests/node_modules
          ln -sf ${{ github.workspace }}/node_modules/playwright \
                 citadel-workspaces/integration-tests/node_modules/playwright
          ln -sf ${{ github.workspace }}/node_modules/@playwright \
                 citadel-workspaces/integration-tests/node_modules/@playwright
      - name: Start Services
        env:
          INTERNAL_SERVICE_PORT: '12345'
          WORKSPACE_MASTER_PASSWORD: 'ci-test-password'
        run: docker compose up -d --build --wait
      - name: Dump Service Logs on Start Failure
        if: failure()
        run: |
          echo "=== sync-wasm-client logs ==="
          docker compose logs sync-wasm-client 2>&1 | tail -200
          echo "=== server logs ==="
          docker compose logs server 2>&1 | tail -50
          echo "=== internal-service logs ==="
          docker compose logs internal-service 2>&1 | tail -50
      - name: Clean Docker Build Cache
        run: |
          docker builder prune -af
          docker image prune -af
          df -h
      - name: Run Integration Test
        env:
          IN_CI: 'true'
          WORKSPACE_MASTER_PASSWORD: 'ci-test-password'
          # Several tests call `restartBackendServices` which spawns
          # `docker compose` from the test runner; without
          # INTERNAL_SERVICE_PORT in scope, the docker-compose.yml
          # `${INTERNAL_SERVICE_PORT:-12345}` fallback works but the
          # test runner's docker compose invocations would log a
          # warning. Match Start Services' value so the runner
          # inherits the same env.
          INTERNAL_SERVICE_PORT: '12345'
        run: npm run ${{ matrix.test }}
        working-directory: citadel-workspaces/integration-tests
      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.artifact }}
          path: citadel-workspaces/integration-tests/screenshots/

  deploy-gate-tests:
    # Regression coverage for the release-consistency gate that stands between a `docker
    # compose pull` and a production restart. It is the mechanism that stops a partially
    # promoted `latest` from restarting production on two backend images that never shipped
    # together - so it must not be the one piece of the deploy path that nothing exercises.
    #
    # Runs against REAL images with real labels (cheap: a few `FROM busybox` layers), so it
    # tests `docker image inspect` behaviour rather than a mock of it - including the
    # `<no value>` string docker prints for an absent label, which is exactly the sort of
    # detail a stub would paper over.
    name: Deploy Gate - image revision check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build fixture images
        run: |
          set -euo pipefail
          printf 'FROM busybox\nLABEL org.opencontainers.image.revision=aaaaaaaaaaaa\n' | docker build -q -t rev-a - >/dev/null
          printf 'FROM busybox\nLABEL org.opencontainers.image.revision=aaaaaaaaaaaa\n' | docker build -q -t rev-a-copy - >/dev/null
          printf 'FROM busybox\nLABEL org.opencontainers.image.revision=bbbbbbbbbbbb\n' | docker build -q -t rev-b - >/dev/null
          printf 'FROM busybox\n' | docker build -q -t rev-none - >/dev/null

      - name: Matching revisions are allowed through
        run: |
          set -euo pipefail
          ./scripts/verify-image-revisions.sh rev-a rev-a-copy
          echo "PASS: images from the same commit deploy."

      - name: MISMATCHED revisions abort the deploy
        run: |
          set -euo pipefail
          if ./scripts/verify-image-revisions.sh rev-a rev-b; then
            echo "::error::The gate allowed images from DIFFERENT commits through. A partial 'latest' promotion would restart production on a mismatched pair."
            exit 1
          fi
          echo "PASS: mismatched images are refused."

      - name: Unlabelled images warn but do not block
        # Locally-built and pre-label images carry no revision. Blocking them would strand
        # anyone deploying an older or locally built image, so the documented behaviour is to
        # warn and continue - pinned here so it cannot silently become a hard failure.
        run: |
          set -euo pipefail
          ./scripts/verify-image-revisions.sh rev-a rev-none
          ./scripts/verify-image-revisions.sh rev-none rev-none
          echo "PASS: unlabelled images fall back to a warning."

      - name: A MISSING image is refused, not treated as unlabelled
        # `docker image inspect` fails outright for an image that was never pulled. That must NOT
        # be conflated with "inspected fine, but carries no label" - an image we cannot see is an
        # image we cannot verify, so it has to fail the gate rather than slip through the
        # warn-and-continue path. Asserting the FAILURE here is the point: an earlier version of
        # this step passed whichever way the script behaved, which pinned the bypass instead of
        # catching it.
        run: |
          set -euo pipefail
          if ./scripts/verify-image-revisions.sh rev-a definitely-not-pulled:latest 2>/dev/null; then
            echo "::error::The gate ALLOWED an image it could not even inspect. A partially completed 'docker compose pull' would sail straight through the release-consistency check."
            exit 1
          fi
          echo "PASS: an un-inspectable image is refused."

      - name: deploy.sh parses
        run: bash -n deploy.sh && bash -n scripts/verify-image-revisions.sh

  production-build:
    name: Production Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Free Disk Space
        run: |
          # Remove unnecessary pre-installed tools (frees 10-20 GB)
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h
      - name: Generate WASM artifacts (required for UI production build)
        # The UI production build embeds the wasm-pack generated
        # `citadel_internal_service_wasm_client.js` (and the matching
        # .wasm binary). Those artifacts are NOT git-tracked — they
        # land in citadel-internal-service/typescript-client/ via the
        # `sync-wasm-client` one-shot container that ships in
        # docker-compose.yml. Without it, the Vite production build
        # fails to resolve `../citadel_internal_service_wasm_client.js`
        # from `dist/InternalServiceWasmClient.js`.
        env:
          WORKSPACE_MASTER_PASSWORD: 'ci-prod-build'
          INTERNAL_SERVICE_PORT: '12345'
        run: docker compose up --build sync-wasm-client
      - name: Build Production Images (server + internal-service + ui)
        run: |
          # The UI image has its own multi-stage `production` target with
          # a hand-written nginx config (printf'd from the Dockerfile), a
          # non-root user setup, and a security-header block. None of that
          # is exercised by the dev `target: dev` build, so a syntax error
          # in the printf, a wrong `COPY --from=build` path, or a missing
          # `target: production` would previously only surface during an
          # actual production deploy. Building it in CI catches those.
          docker compose -f docker-compose.production.yml build server internal-service ui
      - name: Verify Images Were Built
        run: |
          echo "Checking for built images..."
          # docker compose build tags images as <project>-<service>
          docker images
          # Verify all three images exist and are non-empty
          SERVER_IMAGE=$(docker compose -f docker-compose.production.yml images server --format json | head -1)
          IS_IMAGE=$(docker compose -f docker-compose.production.yml images internal-service --format json | head -1)
          UI_IMAGE=$(docker compose -f docker-compose.production.yml images ui --format json | head -1)
          # Fail if ANY image is missing. Listing each one explicitly keeps
          # the failure message specific about which build silently dropped.
          if [ -z "$SERVER_IMAGE" ] || [ -z "$IS_IMAGE" ] || [ -z "$UI_IMAGE" ]; then
            echo "ERROR: Production images were not built (server='$SERVER_IMAGE', internal-service='$IS_IMAGE', ui='$UI_IMAGE')"
            exit 1
          fi
          echo "Production images built successfully"
      - name: Smoke Test - Services Start
        env:
          WORKSPACE_MASTER_PASSWORD: 'ci-smoke-test'
          INTERNAL_SERVICE_PORT: '12345'
        run: |
          # Start services and wait for health checks.
          #
          # Worst-case time to "healthy" is `start_period + retries *
          # interval` from each service's healthcheck definition. The
          # production compose currently uses 60s start_period + 5
          # retries * 15s interval = 135s ceiling, so this timeout has
          # to be larger than 135s with margin. Previously 120s, which
          # would race the healthcheck window and report flaky
          # failures even on healthy services.
          docker compose -f docker-compose.production.yml up -d server internal-service
          echo "Waiting for server to become healthy..."
          timeout 180 bash -c 'until docker compose -f docker-compose.production.yml ps server --format json | grep -qw healthy; do sleep 5; echo "Waiting..."; done' || {
            echo "Server failed to become healthy"
            docker compose -f docker-compose.production.yml logs server
            exit 1
          }
          echo "Server is healthy"
          echo "Waiting for internal-service to become healthy..."
          timeout 180 bash -c 'until docker compose -f docker-compose.production.yml ps internal-service --format json | grep -qw healthy; do sleep 5; echo "Waiting..."; done' || {
            echo "Internal-service failed to become healthy"
            docker compose -f docker-compose.production.yml logs internal-service
            exit 1
          }
          echo "Internal-service is healthy"
          # UI nginx smoke test. The production UI container has no
          # docker healthcheck of its own — it's a stateless nginx
          # serving static SPA assets — so we exercise it directly by
          # starting it and curling its bound port. A failure here
          # catches: the nginx config printf'd in the Dockerfile being
          # malformed, the `COPY --from=build /app/dist` path being
          # wrong, the non-root chown step landing on the wrong dirs,
          # or the CSP `connect-src` allow-list being missing for ws.
          docker compose -f docker-compose.production.yml up -d ui
          echo "Waiting for UI to start serving on port 8080 (host network)..."
          # The UI's nginx listens on 8080 and `docker-compose.production.yml`
          # uses `network_mode: host`, so curl localhost directly. Wait up
          # to 60s for the container to bind the port and serve the SPA.
          if ! timeout 60 bash -c 'until curl -fsS -o /dev/null http://localhost:8080/; do sleep 2; echo "Waiting..."; done'; then
            echo "UI failed to serve on port 8080"
            docker compose -f docker-compose.production.yml logs ui
            exit 1
          fi
          # Sanity: the served root must contain the SPA shell. A
          # successful 200 from a misconfigured root (e.g. nginx default
          # welcome page) would otherwise mask a Dockerfile regression.
          if ! curl -fsS http://localhost:8080/ | grep -q -i '<div id="root"'; then
            echo "UI served a 200 but the response does not look like the SPA shell"
            curl -fsS http://localhost:8080/ | head -40
            exit 1
          fi
          echo "UI is serving the SPA shell"
          echo "Smoke test passed: server, internal-service, ui all up"
      - name: Persistence - restarting the server must not duplicate the workspace tree
        # THE gap that let the structure-duplication bug ship. Every other test runs the server
        # on the IN-MEMORY backend, where each boot legitimately starts from an empty store - so
        # seeding-on-every-boot is indistinguishable from correct behaviour and no unit test can
        # see the bug. Only a real restart against a real filesystem backend exposes it, and
        # `docker-compose.production.yml` is the only place the server runs that way.
        #
        # The server container from the smoke test above is already running with
        # WORKSPACE_BACKEND=filesystem on the `server_data` volume. Restart it against that SAME
        # volume and assert it did not seed a second copy of the office/room tree.
        env:
          WORKSPACE_MASTER_PASSWORD: 'ci-smoke-test'
          INTERNAL_SERVICE_PORT: '12345'
        run: |
          set -euo pipefail
          compose="docker compose -f docker-compose.production.yml"

          # Guard against a vacuous pass: if the FIRST boot seeded nothing, "the restart created
          # nothing" would be trivially true and would prove nothing.
          seeded_on_first_boot=$($compose logs server 2>&1 | grep -c "Creating office node" || true)
          echo "First boot seeded ${seeded_on_first_boot} offices."
          if [ "$seeded_on_first_boot" -eq 0 ]; then
            echo "::error::The server seeded no offices at all, so this check would be vacuous."
            $compose logs server 2>&1 | tail -40
            exit 1
          fi

          # Only inspect logs emitted AFTER the restart. Comparing cumulative counts before/after
          # would couple the result to docker's log buffering and rotation: if the daemon dropped
          # early lines, the "after" count could come out LOWER and the check would misfire. A
          # `--since` window asks the precise question instead - "did this boot create any office
          # or room nodes?" - and the answer must be no.
          restart_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Restarting the server against the same data volume (window starts ${restart_at})..."
          $compose restart server
          timeout 180 bash -c 'until docker compose -f docker-compose.production.yml ps server --format json | grep -qw healthy; do sleep 5; done' || {
            echo "::error::Server did not come back healthy after restart"
            $compose logs server 2>&1 | tail -40
            exit 1
          }

          created_after_restart=$($compose logs server --since "$restart_at" 2>&1 | grep -cE "Creating (office|room) node" || true)
          echo "Nodes created by the restarted server: ${created_after_restart}"

          if [ "$created_after_restart" -ne 0 ]; then
            echo "::error::The restart re-seeded the workspace: it created ${created_after_restart} office/room nodes on top of the existing tree. On a persistent backend this grows an extra copy of the whole tree on EVERY deploy."
            $compose logs server --since "$restart_at" 2>&1 | grep -E "Creating (office|room) node" | head -20
            exit 1
          fi

          # Positive confirmation, not just an absence: the guard must actually have run and said
          # so. Without this, a server that failed to reach the seeding code at all would also
          # produce zero creations and pass.
          if ! $compose logs server --since "$restart_at" 2>&1 | grep -q "already seeded; skipping"; then
            echo "::error::The restarted server never reported skipping the seed. It may not have reached the guard at all - this check cannot confirm the behaviour."
            $compose logs server --since "$restart_at" 2>&1 | tail -30
            exit 1
          fi
          echo "PASS: the restart created no offices or rooms, and the seed-once guard fired."
      - name: Dump Logs on Failure
        if: failure()
        run: |
          echo "=== server logs ==="
          docker compose -f docker-compose.production.yml logs server 2>&1 | tail -100
          echo "=== internal-service logs ==="
          docker compose -f docker-compose.production.yml logs internal-service 2>&1 | tail -100
          echo "=== ui logs ==="
          docker compose -f docker-compose.production.yml logs ui 2>&1 | tail -100
      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.production.yml down -v --remove-orphans 2>/dev/null || true

