name: Validate PR
on:
  workflow_call:
  pull_request:
  push:
    branches: ["master"]

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  # 40 MiB stack
  RUST_MIN_STACK: 40971520
  RUST_LOG: "citadel=warn"
  # Skip WASM build in CI (no wasm-pack installed)
  SKIP_WASM_BUILD: "1"

jobs:
  fmt:
    name: Cargo Fmt - ${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - citadel-workspace-types
          - citadel-workspace-internal-service
          - citadel-workspace-server-kernel
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: Avarok-Cybersecurity/gh-actions-deps@master
      - name: Run Cargo Fmt
        run: cargo fmt -p ${{ matrix.crate }} --check

  clippy:
    name: Cargo Clippy - ${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - citadel-workspace-types
          - citadel-workspace-internal-service
          - citadel-workspace-server-kernel
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: Avarok-Cybersecurity/gh-actions-deps@master
      - name: Run Cargo Clippy
        run: cargo clippy -p ${{ matrix.crate }} -- -D warnings

  rust-tests:
    name: Rust Tests - ${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - citadel-workspace-types
          - citadel-workspace-internal-service
          - citadel-workspace-server-kernel
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: Avarok-Cybersecurity/gh-actions-deps@master
      - name: Run Cargo Test
        run: cargo test -p ${{ matrix.crate }}

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Workspace Dependencies
        # Install from root to resolve file: dependencies between workspaces
        run: npm ci
      - name: Build citadel-internal-service typescript-client
        # Build the WASM client's TypeScript wrapper first (innermost dependency)
        run: npm run build
        working-directory: citadel-internal-service/typescript-client
      - name: Build citadel-workspace-client-ts
        # Build client-ts to generate dist/ with TypeScript declarations
        run: npm run build
        working-directory: citadel-workspace-client-ts
      - name: Install Vitest
        # Ensure vitest is available at root for workspace to use
        run: npm install vitest@3.0.7 --save-dev
      - name: Run Unit Tests
        # Run vitest directly to avoid npm -w matching nested integration-tests workspace
        run: npx vitest run
        working-directory: citadel-workspaces

  typecheck:
    name: TypeScript Type Check - ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: citadel-workspaces
            path: citadel-workspaces
          - project: citadel-workspace-client-ts
            path: citadel-workspace-client-ts
          - project: integration-tests
            path: citadel-workspaces/integration-tests
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Workspace Dependencies
        # Install from root to resolve file: dependencies between workspaces
        run: npm ci
      - name: Build citadel-internal-service typescript-client
        # Build the WASM client's TypeScript wrapper first (innermost dependency)
        # Now part of npm workspaces, so deps installed by root npm ci
        run: npm run build
        working-directory: citadel-internal-service/typescript-client
      - name: Build citadel-workspace-client-ts
        # Build client-ts to generate dist/ with TypeScript declarations
        run: npm run build
        working-directory: citadel-workspace-client-ts
      - name: Run Type Check
        run: |
          if [ "${{ matrix.project }}" = "citadel-workspaces" ]; then
            # Run from root for bundler moduleResolution (needs hoisted react)
            npx tsc -p ${{ matrix.path }}/tsconfig.app.json --noEmit
          elif [ "${{ matrix.project }}" = "integration-tests" ]; then
            # Symlink playwright for NodeNext resolution
            mkdir -p ${{ matrix.path }}/node_modules
            ln -sf ${{ github.workspace }}/node_modules/playwright ${{ matrix.path }}/node_modules/playwright
            npm run typecheck -w cw-integration-tests
          else
            npm run typecheck -w ${{ matrix.project }}
          fi

  lint:
    name: ESLint - ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: citadel-workspaces
            path: citadel-workspaces
          - project: citadel-workspace-client-ts
            path: citadel-workspace-client-ts
          - project: integration-tests
            path: citadel-workspaces/integration-tests
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Workspace Dependencies
        # Install from root to resolve file: dependencies between workspaces
        run: npm ci
      - name: Build citadel-internal-service typescript-client
        # Build the WASM client's TypeScript wrapper first (innermost dependency)
        run: npm ci && npm run build
        working-directory: citadel-internal-service/typescript-client
      - name: Build citadel-workspace-client-ts
        # Build client-ts to generate dist/ with TypeScript declarations
        run: npm run build
        working-directory: citadel-workspace-client-ts
      - name: Install ESLint at root (workspaces hoisting issue)
        # Workspaces may hoist eslint to workspace dirs instead of root
        run: npm install eslint@9.39.2 --save-dev
      - name: Run ESLint
        # Symlink hoisted packages and use root eslint binary via .bin
        run: |
          mkdir -p node_modules/@eslint
          ln -sf ${{ github.workspace }}/node_modules/@eslint/js node_modules/@eslint/js
          ln -sf ${{ github.workspace }}/node_modules/globals node_modules/globals
          ln -sf ${{ github.workspace }}/node_modules/typescript-eslint node_modules/typescript-eslint
          ${{ github.workspace }}/node_modules/.bin/eslint .
        working-directory: ${{ matrix.path }}

  integration-tests:
    name: Integration Test - ${{ matrix.test }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - test: test:p2p
            artifact: p2p
          - test: test:live-doc
            artifact: live-doc
          - test: test:group
            artifact: group
          - test: test:group-multiuser
            artifact: group-multiuser
          - test: test:crud
            artifact: crud
          - test: test:login
            artifact: login
          # test:prev-sessions moved to heavy-integration-tests (self-hosted runner)
          - test: test:file-transfer
            artifact: file-transfer
          - test: test:offline
            artifact: offline
          - test: test:hard-disconnect
            artifact: hard-disconnect
          - test: test:permissions
            artifact: permissions
          - test: test:admin-modal
            artifact: admin-modal
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Free Disk Space
        run: |
          # Remove unnecessary pre-installed tools (frees 10-20 GB)
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
      - name: Install Dependencies
        run: npm ci
        working-directory: citadel-workspaces/integration-tests
      - name: Start Services
        env:
          INTERNAL_SERVICE_PORT: '12345'
        run: docker compose up -d --wait
      - name: Dump Service Logs on Start Failure
        if: failure()
        run: |
          echo "=== sync-wasm-client logs ==="
          docker compose logs sync-wasm-client 2>&1 | tail -200
          echo "=== server logs ==="
          docker compose logs server 2>&1 | tail -50
          echo "=== internal-service logs ==="
          docker compose logs internal-service 2>&1 | tail -50
      - name: Clean Docker Build Cache
        run: |
          docker builder prune -af
          docker image prune -af
          df -h
      - name: Run Integration Test
        env:
          IN_CI: 'true'
        run: npm run ${{ matrix.test }}
        working-directory: citadel-workspaces/integration-tests
      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.artifact }}
          path: citadel-workspaces/integration-tests/screenshots/

  # Heavy integration tests run on self-hosted runner (more resources)
  # Only auto-runs for CODEOWNERS, otherwise requires workflow_dispatch approval
  heavy-integration-tests:
    name: Heavy Integration Tests (Self-Hosted)
    runs-on: [self-hosted, heavy-tests]
    # Only run for CODEOWNERS or workflow_dispatch (manual trigger with approval)
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(fromJSON('["tbraun96", "Raduc4", "Tjemmmic"]'), github.actor)
    env:
      # Self-hosted runner may have mismatched home dirs between install and test steps.
      # Use explicit path so playwright install and test both find the same browsers.
      PLAYWRIGHT_BROWSERS_PATH: /tmp/pw-browsers
    steps:
      - name: Fix Docker-created root-owned files
        run: |
          # Docker containers create files as root, which prevents checkout cleanup
          # Fix ownership before checkout so actions/checkout can clean properly
          # Self-hosted runner has a known workspace path structure
          RUNNER_WORK_DIR="/home/ubuntu/actions-runner-workspace/_work"
          REPO_DIR="$RUNNER_WORK_DIR/citadel-workspace/citadel-workspace"

          echo "Current user: $(whoami)"
          echo "Fixing ownership in: $REPO_DIR"

          # Fix the repo directory if it exists
          if [ -d "$REPO_DIR" ]; then
            echo "Found repo dir, fixing ownership..."
            sudo chown -R $(whoami):$(whoami) "$REPO_DIR" 2>&1 || true
          fi

          # Also fix the parent citadel-workspace directory
          PARENT_DIR="$RUNNER_WORK_DIR/citadel-workspace"
          if [ -d "$PARENT_DIR" ]; then
            echo "Fixing parent: $PARENT_DIR"
            sudo chown -R $(whoami):$(whoami) "$PARENT_DIR" 2>&1 || true
          fi

          # Verify fix worked
          echo "Checking for remaining root-owned files..."
          if [ -d "$REPO_DIR" ]; then
            ROOT_FILES=$(sudo find "$REPO_DIR" -user root -type f 2>/dev/null | wc -l)
            echo "Root-owned files remaining: $ROOT_FILES"
            if [ "$ROOT_FILES" -gt 0 ]; then
              sudo find "$REPO_DIR" -user root -type f 2>/dev/null | head -5
            fi
          fi
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm ci
        working-directory: citadel-workspaces/integration-tests
      - name: Install Playwright Browsers
        # Note: --with-deps skipped on self-hosted runner (system deps pre-installed)
        # Use node_modules/.bin/playwright directly to ensure we use the exact
        # playwright version installed by npm ci (npx may resolve differently)
        run: ./node_modules/.bin/playwright install chromium
        working-directory: citadel-workspaces/integration-tests
      - name: Clean Up Previous Containers
        run: |
          # Stop any existing docker-compose services from previous runs
          docker compose down --volumes --remove-orphans --timeout 0 2>/dev/null || true
          # Stop any standalone citadel containers that might conflict
          docker ps -q --filter "name=citadel" | xargs -r docker stop 2>/dev/null || true
          docker ps -aq --filter "name=citadel" | xargs -r docker rm 2>/dev/null || true
          # Clean up any dangling containers
          docker container prune -f 2>/dev/null || true
      - name: Force Rebuild Docker Images
        # Self-hosted runners cache Docker images from previous runs, which may
        # have stale WASM builds or outdated code. Force rebuild to ensure fresh.
        # INTERNAL_SERVICE_PORT is a build arg for the internal-service Dockerfile
        env:
          INTERNAL_SERVICE_PORT: '12345'
        run: docker compose build --no-cache
      - name: Start Services
        env:
          INTERNAL_SERVICE_PORT: '12345'
        run: docker compose up -d --wait
      - name: Dump Service Logs on Start Failure
        if: failure()
        run: |
          echo "=== sync-wasm-client logs ==="
          docker compose logs sync-wasm-client 2>&1 | tail -200
          echo "=== server logs ==="
          docker compose logs server 2>&1 | tail -50
          echo "=== internal-service logs ==="
          docker compose logs internal-service 2>&1 | tail -50
      - name: Run Heavy Integration Tests
        env:
          IN_CI: 'true'
        run: npm run test:prev-sessions
        working-directory: citadel-workspaces/integration-tests
        timeout-minutes: 15
      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-prev-sessions
          path: citadel-workspaces/integration-tests/screenshots/
      - name: Stop Services
        if: always()
        run: docker compose down --volumes --remove-orphans 2>/dev/null || true
